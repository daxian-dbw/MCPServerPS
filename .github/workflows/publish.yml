name: Publish Module

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'What to publish'
        required: true
        default: 'both'
        type: choice
        options:
          - package
          - release
          - both
      tag:
        description: 'Release tag (e.g. v1.2.3) — required when publishing a release via workflow_dispatch'
        required: false

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.ref_name || inputs.tag }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore MCPServerPS.csproj

    - name: Build and publish module
      run: dotnet publish MCPServerPS.csproj --no-restore --configuration Release

    - name: Publish PowerShell Module to GitHub Packages
      if: >
        github.event_name == 'release' ||
        inputs.publish_target == 'package' ||
        inputs.publish_target == 'both'
      shell: pwsh
      run: |
        # Register GitHub Packages as a PSRepository
        $repoParams = @{
            Name = 'GitHubPackages'
            Uri = 'https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json'
            Trusted = $true
            ApiVersion = 'V3'
        }
        Register-PSResourceRepository @repoParams

        # Publish the module to GitHub Packages
        Publish-PSResource -Path ./out/MCPServerPS -Repository GitHubPackages -ApiKey ${{ secrets.GITHUB_TOKEN }} -Verbose

    - name: Zip module output
      if: >
        github.event_name == 'release' ||
        inputs.publish_target == 'release' ||
        inputs.publish_target == 'both'
      run: |
        zip -r out/MCPServerPS-${{ env.RELEASE_TAG }}.zip out/MCPServerPS/

    - name: Create or upload GitHub Release
      if: >
        github.event_name == 'release' ||
        inputs.publish_target == 'release' ||
        inputs.publish_target == 'both'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          gh release upload ${{ env.RELEASE_TAG }} out/MCPServerPS-${{ env.RELEASE_TAG }}.zip
        else
          gh release create ${{ env.RELEASE_TAG }} \
            out/MCPServerPS-${{ env.RELEASE_TAG }}.zip \
            --title "MCPServerPS ${{ env.RELEASE_TAG }}" \
            --generate-notes \
            --draft
        fi

    - name: Upload module artifact
      uses: actions/upload-artifact@v4
      with:
        name: MCPServerPS-Module
        path: out/MCPServerPS/
        retention-days: 90
